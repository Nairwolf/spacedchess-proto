services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: spacedchess
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spacedchess}
      POSTGRES_DB: spacedchess
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spacedchess -d spacedchess']
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://spacedchess:${POSTGRES_PASSWORD:-spacedchess}@db:5432/spacedchess?sslmode=disable
      # Set to "true" when serving over HTTPS (e.g. behind a reverse proxy).
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      # Set to "false" to close self-registration after creating your account.
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    ports:
      - '${PORT:-8080}:8080'

volumes:
  db-data:
